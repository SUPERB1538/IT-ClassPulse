<h1>Dashboard</h1>

<p>Welcome, {{ request.user.username }}</p>

<h2>Upcoming Assignments</h2>

<ul>
    {% for assignment in assignments %}
        <li>
            {{ assignment.title }} - {{ assignment.due_date }} - {{ assignment.status }}
        </li>
    {% empty %}
        <li>No assignments yet.</li>
    {% endfor %}
</ul>

<a href="/accounts/logout/">Logout</a>
