<h1>Add Course</h1>

<form method="post">
    {% csrf_token %}
    <p>
        Course Name:
        <input type="text" name="course_name">
    </p>

    <p>
        Semester:
        <input type="text" name="semester">
    </p>

    <button type="submit">Add</button>
</form>

<a href="/courses/">Back to Courses</a>
